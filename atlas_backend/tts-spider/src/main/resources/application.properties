spring.profiles.active=dev
server.port=9010
server.context-path=/tts
server.servlet.context-path=/tts


#开启日志(简单开启日志的方式，如果有logback-spring.xml等配置，则可以注释)
#logging.level.root=info
#logging.level.com.yh.bigdata.tts.common.dao=debug
#logging.level.org.springframework.web=INFO
#logging.level.org.apache.http=info
#logging.file=logs/tts/tts-api.log
log.path=logs/


#mybatis相关的配置
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.yh.bigdata.tts.common.model

custom.datasource.names=default
#custom.datasource.default.driver-class-name=com.mysql.jdbc.Driver
custom.datasource.default.driver-class-name=com.mysql.cj.jdbc.Driver
#custom.datasource.default.url=jdbc:mysql://10.251.136.13:3306/tts
#custom.datasource.default.username=dws_dev
#custom.datasource.default.password=*gdW9AJItBkP
custom.datasource.default.url=jdbc:mysql://localhost:3306/tts?userUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true
custom.datasource.default.username=root
custom.datasource.default.password=root1234

realtime.spider.on=false
#day.all.spider.cron=0 10 15 * * 1-5
day.all.spider.cron=0 10 15 * * 7
realtime.check.cron=0/30 * 9-11,13-14 * * 1-5

# Atlas 年报爬虫（东方财富 F10，默认关闭；生产按需 atlas.spider.report.enabled=true）
atlas.db.schema-init=true
atlas.spider.report.enabled=false
atlas.spider.report.years=15
atlas.spider.report.interval-ms=300
atlas.spider.report.monthly.cron=0 0 3 1 * ?
atlas.spider.report.peak.cron=0 0 3 ? * SUN
atlas.spider.report.manual-enabled=true
atlas.spider.detail.interval-ms=250

# 详情页数据底座：公司详情 → 年报15年 → 行业均值（定时默认关，手动 POST /stock/admin/crawl-all）
atlas.spider.foundation.enabled=false
atlas.spider.foundation.cron=0 0 2 ? * SUN

# 估值批量刷新：东财 clist（手动 POST /stock/admin/refresh-valuation）
atlas.spider.valuation.enabled=false
atlas.spider.valuation.page-size=100
atlas.spider.valuation.page-interval-ms=400
atlas.spider.valuation.page-retries=2
atlas.spider.valuation.morning-cron=0 0 9 * * 1-5
atlas.spider.valuation.close-cron=0 10 16 * * 1-5

# 上下游（巨潮年报 PDF）：手动 POST /stock/admin/crawl-trading-parties
atlas.spider.trading-parties.interval-ms=1500
# 巨潮年报 PDF 本地暂存目录（{code}/{year}.pdf）
atlas.spider.cninfo.pdf-dir=./data/cninfo-pdf
atlas.spider.cninfo.pdf-cache-read=true

# Atlas 策略手动触发（开发环境）
atlas.strategy.manual-enabled=true
atlas.strategy.rescan-enabled=true

#last.trade.day=2019-04-24
#last.trade.week=2019-04-19
spider.day.interval=200
spider.day.startpage=1
spider.week.startpage=1
spider.month.startpage=1
spider.year.startpage=1
spider.notice.startpage=1
spider.report.startpage=1

# Atlas API：启动时加载 K 线缓存到 RealtimeStockCache（无需 -Dproject=app）
atlas.cache.enabled=true
project=app

